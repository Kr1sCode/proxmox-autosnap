<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>autosnap · logowanie</title>
<style>
  :root{--bg:#f5f6f8;--panel:#fff;--line:#d9dce1;--txt:#2b3034;--dim:#7b838b;--accent:#2d7dd2;--accent-bg:#eaf2fb;--red:#cf3b45}
  *{box-sizing:border-box}
  body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--txt);
    font:13px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
  .card{width:min(370px,92vw);background:var(--panel);border:1px solid var(--line);border-radius:12px;
    box-shadow:0 1px 2px rgba(20,30,45,.06),0 8px 26px rgba(20,30,45,.1);overflow:hidden}
  .head{padding:26px 26px 6px;text-align:center}
  .logo{font-size:20px;font-weight:600}.logo .mk{color:var(--accent)}
  .sub{color:var(--dim);font-size:12.5px;margin-top:4px}
  form{padding:18px 26px 24px;display:grid;gap:14px}
  label{font-size:11.5px;color:var(--dim);font-weight:600;margin-bottom:5px;display:block}
  input,select{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:10px 11px;border-radius:8px;font:inherit}
  input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
  .row{display:flex;gap:10px}.row>div{flex:1}
  button{margin-top:2px;background:var(--accent);border:1px solid var(--accent);color:#fff;padding:11px;border-radius:8px;
    font:inherit;font-weight:600;cursor:pointer;transition:.12s}
  button:hover{background:#2670bd}button:disabled{opacity:.6;cursor:not-allowed}
  .err{background:#fbeef0;border:1px solid #e7c4c7;color:var(--red);padding:9px 12px;border-radius:8px;font-size:12px;display:none}
  .err.show{display:block}
  .hint{color:var(--dim);font-size:11.5px;text-align:center}
</style>
</head>
<body>
  <div class="card">
    <div class="head"><div class="logo"><span class="mk">◆</span> autosnap</div><div class="sub">logowanie poświadczeniami Proxmoksa</div></div>
    <form id="f" onsubmit="return doLogin(event)">
      <div class="err" id="err"></div>
      <div class="row">
        <div><label>Użytkownik</label><input id="u" value="root" autocomplete="username" autofocus></div>
        <div style="flex:0 0 108px"><label>Realm</label><select id="r"><option value="pam">pam</option><option value="pve">pve</option></select></div>
      </div>
      <div><label>Hasło</label><input id="p" type="password" autocomplete="current-password"></div>
      <button id="btn" type="submit">Zaloguj</button>
      <div class="hint">to samo hasło co w Proxmoksie · weryfikowane na żywo</div>
    </form>
  </div>
<script>
async function doLogin(e){
  e.preventDefault();const btn=document.getElementById('btn'),err=document.getElementById('err');
  btn.disabled=true;btn.textContent='Sprawdzam…';err.className='err';
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:document.getElementById('u').value.trim(),realm:document.getElementById('r').value,password:document.getElementById('p').value})});
    const j=await r.json();
    if(r.ok){location.href='/';return false;}
    err.textContent=j.error||('błąd '+r.status);err.className='err show';
  }catch(ex){err.textContent='błąd połączenia';err.className='err show';}
  btn.disabled=false;btn.textContent='Zaloguj';return false;
}
</script>
</body>
</html>
