<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>autosnap · login</title>
<style>
  :root{--bg:#f5f6f8;--panel:#fff;--line:#d9dce1;--txt:#2b3034;--dim:#7b838b;--accent:#2d7dd2;--accent-bg:#eaf2fb;--red:#cf3b45;
    --err-bg:#fbeef0;--err-line:#e7c4c7;--shadow:0 1px 2px rgba(20,30,45,.06),0 8px 26px rgba(20,30,45,.1)}
  :root[data-theme="dark"]{--bg:#0f141a;--panel:#161d26;--line:#28323e;--txt:#dbe4ee;--dim:#8695a6;--accent:#4aa3e0;--accent-bg:#12283a;--red:#e05a64;
    --err-bg:#2a1417;--err-line:#5a2830;--shadow:0 1px 2px rgba(0,0,0,.3),0 10px 26px rgba(0,0,0,.4)}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--txt);
    font:13px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
  .topbar{position:fixed;top:14px;right:16px;display:flex;gap:8px;align-items:center}
  .seg2{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .seg2 button{border:none;background:var(--panel);color:var(--dim);padding:5px 9px;cursor:pointer;font:inherit;font-size:11.5px;font-weight:600}
  .seg2 button.active{background:var(--accent);color:#fff}
  .tbtn{width:30px;height:28px;border:1px solid var(--line);border-radius:7px;background:var(--panel);cursor:pointer;font-size:14px}
  .card{width:min(370px,92vw);background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
  .head{padding:26px 26px 6px;text-align:center}
  .logo{font-size:20px;font-weight:600}.logo .mk{color:var(--accent)}
  .sub{color:var(--dim);font-size:12.5px;margin-top:4px}
  form{padding:18px 26px 24px;display:grid;gap:14px}
  label{font-size:11.5px;color:var(--dim);font-weight:600;margin-bottom:5px;display:block}
  input,select{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:10px 11px;border-radius:8px;font:inherit}
  input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
  .row{display:flex;gap:10px}.row>div{flex:1}
  button.submit{margin-top:2px;background:var(--accent);border:1px solid var(--accent);color:#fff;padding:11px;border-radius:8px;font:inherit;font-weight:600;cursor:pointer}
  button.submit:hover{filter:brightness(1.06)}button.submit:disabled{opacity:.6;cursor:not-allowed}
  .err{background:var(--err-bg);border:1px solid var(--err-line);color:var(--red);padding:9px 12px;border-radius:8px;font-size:12px;display:none}
  .err.show{display:block}
  .hint{color:var(--dim);font-size:11.5px;text-align:center}
  .linkbtn{background:none;border:none;color:var(--dim);font:inherit;font-size:11.5px;text-decoration:underline;cursor:pointer;padding:0}
  .linkbtn:hover{color:var(--accent)}
  #c{letter-spacing:3px;font-size:16px;text-align:center;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
  <div class="topbar">
    <div class="seg2" id="langSeg"><button data-lang="en" onclick="setLang('en')">EN</button><button data-lang="pl" onclick="setLang('pl')">PL</button></div>
    <button class="tbtn" id="themeBtn" onclick="toggleTheme()">🌙</button>
  </div>
  <div class="card">
    <div class="head"><div class="logo"><span class="mk">◆</span> autosnap</div><div class="sub" data-i18n="sub">sign in with your Proxmox credentials</div></div>
    <form id="f" onsubmit="return doLogin(event)">
      <div class="err" id="err"></div>
      <div id="step1" style="display:grid;gap:14px">
        <div class="row">
          <div><label data-i18n="user">User</label><input id="u" value="root" autocomplete="username" autofocus></div>
          <div style="flex:0 0 108px"><label data-i18n="realm">Realm</label><select id="r"><option value="pam">pam</option><option value="pve">pve</option></select></div>
        </div>
        <div><label data-i18n="password">Password</label><input id="p" type="password" autocomplete="current-password"></div>
      </div>
      <div id="step2" style="display:none">
        <label data-i18n="code">Verification code</label>
        <input id="c" inputmode="numeric" autocomplete="one-time-code" maxlength="8" placeholder="123456">
      </div>
      <button class="submit" id="btn" type="submit" data-i18n="signin">Sign in</button>
      <div class="hint" id="hint" data-i18n="hint">same password as in Proxmox · validated live</div>
      <button type="button" class="linkbtn" id="back" style="display:none" data-i18n="startOver" onclick="resetForm()">start again</button>
    </form>
  </div>
<script>
const I18N={en:{sub:"sign in with your Proxmox credentials",user:"User",realm:"Realm",password:"Password",signin:"Sign in",
  hint:"same password as in Proxmox · validated live",checking:"Checking…",badlogin:"wrong login or password",connerr:"connection error",
  code:"Verification code",codeHint:"6-digit code from your authenticator app",verify:"Verify",badcode:"wrong verification code",
  startOver:"start again"},
 pl:{sub:"logowanie poświadczeniami Proxmoksa",user:"Użytkownik",realm:"Realm",password:"Hasło",signin:"Zaloguj",
  hint:"to samo hasło co w Proxmoksie · weryfikowane na żywo",checking:"Sprawdzam…",badlogin:"błędny login lub hasło",connerr:"błąd połączenia",
  code:"Kod weryfikacyjny",codeHint:"6-cyfrowy kod z aplikacji uwierzytelniającej",verify:"Zweryfikuj",badcode:"błędny kod weryfikacyjny",
  startOver:"zacznij od nowa"}};
let LANG=localStorage.getItem('lang')||'en';
const $=id=>document.getElementById(id);
function T(k){return (I18N[LANG][k]||I18N.en[k]||k);}
function applyI18n(){document.documentElement.lang=LANG;
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=T(el.getAttribute('data-i18n')));
  document.querySelectorAll('#langSeg button').forEach(b=>b.classList.toggle('active',b.dataset.lang===LANG));}
function setLang(l){LANG=l;localStorage.setItem('lang',l);applyI18n();}
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);$('themeBtn').textContent=t==='dark'?'☀️':'🌙';localStorage.setItem('theme',t);}
function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}
// Two-step login: the code field only appears once Proxmox says the password
// was right and it wants a second factor (NeedTFA), mirroring the PVE UI.
let TFA=false;
function showTfaStep(){
  TFA=true;
  $('step1').style.display='none';$('step2').style.display='grid';
  $('back').style.display='';$('hint').setAttribute('data-i18n','codeHint');
  $('btn').setAttribute('data-i18n','verify');
  applyI18n();$('c').value='';$('c').focus();
}
function resetForm(){
  TFA=false;
  $('step1').style.display='grid';$('step2').style.display='none';
  $('back').style.display='none';$('hint').setAttribute('data-i18n','hint');
  $('btn').setAttribute('data-i18n','signin');
  $('err').className='err';$('p').value='';applyI18n();$('p').focus();
}
async function doLogin(e){
  e.preventDefault();const btn=$('btn'),err=$('err');btn.disabled=true;btn.textContent=T('checking');err.className='err';
  try{
    const r=TFA
      ? await fetch('/api/login/tfa',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({code:$('c').value.trim()})})
      : await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({username:$('u').value.trim(),realm:$('r').value,password:$('p').value})});
    const j=await r.json();
    if(r.ok&&j.tfa){showTfaStep();btn.disabled=false;return false;}
    if(r.ok){location.href='/';return false;}
    err.textContent=j.error||(TFA?T('badcode'):T('badlogin'));err.className='err show';
    if(TFA){$('c').value='';$('c').focus();}
  }catch(ex){err.textContent=T('connerr');err.className='err show';}
  btn.disabled=false;btn.textContent=T(TFA?'verify':'signin');return false;
}
applyTheme(localStorage.getItem('theme')||'light');applyI18n();
</script>
</body>
</html>
